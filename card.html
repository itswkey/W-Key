<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Playing Cards</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>

    <main id="playing-cards">

        <div class="card">
            <div class="left">
                <div>A</div>
                <div>♠</div>
            </div>
            <div class="middle">
                <div>♠</div>
                <div class="flipped"></div>
            </div>
            <div class="right">

                <div class="flipped">♠</div>
                <div class="flipped">A</div>
                
            </div>


        </div>

         


        <div class="card">
            <div class="left">
                <div>2</div>
                <div>♠</div>
            </div>
            <div class="middle">
                <div>♠</div>
                <div class="flipped">♠</div>
            </div>
            <div class="right">

                <div class="flipped">♠</div>
                <div class="flipped">2</div>
                
            </div>


        </div>

        <div class="card red">
            <div class="left">
                <div>3</div>
                <div>♥</div>
            </div>
            <div class="middle">
                <div>♥</div>
                <div>♥</div>
                <div class="flipped">♥</div>
            </div>
            <div class="right">

                <div class="flipped">♥</div>
                <div class="flipped">3</div>
                
            </div>


        </div>
        
        

    </main>
    
</body>
</html>
